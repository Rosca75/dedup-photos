<!-- components/scan.html -->
<div class="scan-bar">
  <button class="btn btn-primary" id="scan-btn">Scan</button>
  <button class="btn btn-danger" id="cancel-btn" disabled>Cancel</button>
</div>

<script type="module">
document.getElementById('scan-btn').addEventListener('click', window.startScan);
document.getElementById('cancel-btn').addEventListener('click', async () => {
  const response = await fetch('/api/cancel-scan', { method: 'POST' });
  if (response.ok) {
    document.getElementById('cancel-btn').disabled = true;
  }
});
</script>
