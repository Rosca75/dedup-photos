<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DedupPhotos - Duplicate Photo Finder</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/cards.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>

<!-- 4-zone grid layout: topbar, sidebar, main, settings -->
<div class="app-layout">

  <!-- Zone B — Top Bar -->
  <div class="topbar">
    <div class="topbar-row">
      <span class="topbar-title">DedupPhotos</span>
      <input type="text" id="scan-path" placeholder="/path/to/photos" aria-label="Folder path">
      <button class="btn" style="background:var(--bg);border:1px solid var(--border);color:var(--text)" id="browse-btn">Browse</button>
      <div class="threshold-group">
        <label for="scan-threshold">Threshold:</label>
        <input type="number" id="scan-threshold" value="10" min="0" max="64" aria-label="Similarity threshold">
      </div>
      <button class="btn btn-primary" id="scan-btn">Scan</button>
      <button class="btn btn-danger" id="cancel-btn" style="display:none">Cancel</button>
      <div class="topbar-spacer"></div>
      <button class="settings-toggle" id="settings-toggle-btn">Settings &#9654;</button>
    </div>
    <!-- Progress bar (visible during scan) -->
    <div class="progress-section" id="progress-section">
      <div class="progress-header">
        <span id="progress-phase">Scanning...</span>
        <span id="progress-counts">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- Zone A — Left Sidebar: folder tree navigation -->
  <div class="sidebar">
    <div class="sidebar-header">Folders</div>
    <div id="sidebar-tree"></div>
  </div>

  <!-- Zone D — Central Main Area: duplicate groups -->
  <div class="main-area">
    <div id="results-area">
      <div class="empty-state" id="empty-state">
        <div class="icon">&#128247;</div>
        <p>Enter a folder path above and click Scan to find duplicate photos.</p>
      </div>
      <div class="groups" id="groups-container"></div>
    </div>
  </div>

  <!-- Zone C — Right Settings Pane -->
  <div class="settings-pane">
    <div class="settings-pane-header">
      <span class="settings-pane-title">Settings</span>
      <button class="settings-close-btn" id="settings-close-btn">&times;</button>
    </div>
    <div class="settings-field">
      <label for="setting-algorithm">Algorithm</label>
      <select id="setting-algorithm">
        <option value="dhash">dHash (default)</option>
        <option value="phash">pHash</option>
        <option value="both">Both (dHash fallback)</option>
      </select>
    </div>
    <div class="settings-field">
      <label for="setting-extensions">Extensions (comma-separated)</label>
      <input type="text" id="setting-extensions" placeholder="jpg,png,tiff,webp" value="">
    </div>
    <div class="settings-field">
      <label for="setting-min-width">Min width (px, 0=none)</label>
      <input type="number" id="setting-min-width" value="0" min="0">
    </div>
    <div class="settings-field">
      <label for="setting-max-height">Max height (px, 0=none)</label>
      <input type="number" id="setting-max-height" value="0" min="0">
    </div>
  </div>

  <!-- Status Bar at bottom -->
  <div class="status-bar" id="stats-bar">
    <div class="stat-card">
      <div class="label">Files Scanned</div>
      <div class="value" id="stat-files">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Duplicate Groups</div>
      <div class="value" id="stat-groups">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Space Savings</div>
      <div class="value" id="stat-savings">0 B</div>
    </div>
    <div class="stat-card">
      <div class="label">Duration</div>
      <div class="value" id="stat-duration">--</div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
