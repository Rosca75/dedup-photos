<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DedupPhotos - Duplicate Photo Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/table.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>

<!-- 3-zone grid: topbar, left panel + center table -->
<div class="app-layout">

  <!-- Zone B — Top Bar: scan settings + action buttons + stats -->
  <div class="topbar">
    <!-- Row 1: Scan configuration -->
    <div class="topbar-row">
      <span class="topbar-logo"><i data-feather="copy"></i> Dedup Photos</span>
      <div class="topbar-field">
        <label for="scan-path">Source folder</label>
        <div class="input-group">
          <input type="text" id="scan-path" placeholder="/path/to/photos or \\\\NAS\\share">
          <button class="btn btn-outline btn-sm" id="browse-btn"><i data-feather="folder"></i> Browse...</button>
        </div>
      </div>
      <div class="topbar-field">
        <label for="scan-threshold">Threshold difference</label>
        <div class="range-group">
          <input type="range" id="scan-threshold" min="0" max="100" value="10">
          <span class="range-value" id="threshold-value">10%</span>
        </div>
      </div>
      <div class="topbar-field">
        <label for="setting-algorithm">Algorithm</label>
        <select id="setting-algorithm">
          <option value="dhash">dHash</option>
          <option value="phash">pHash</option>
          <option value="both">Both</option>
        </select>
      </div>
      <div class="topbar-field topbar-extensions">
        <label>Extensions to include</label>
        <div class="ext-grid">
          <label><input type="checkbox" value="jpg" checked> JPG</label>
          <label><input type="checkbox" value="png" checked> PNG</label>
          <label><input type="checkbox" value="bmp" checked> BMP</label>
          <label><input type="checkbox" value="tiff" checked> TIFF</label>
          <label><input type="checkbox" value="webp" checked> WEBP</label>
          <label><input type="checkbox" value="gif" checked> GIF</label>
          <label><input type="checkbox" value="heic" checked> HEIC</label>
          <label><input type="checkbox" value="dng" checked> DNG</label>
          <label><input type="checkbox" value="arw" checked> ARW</label>
        </div>
      </div>
      <div class="topbar-field">
        <label for="setting-max-width">Max width (px)</label>
        <input type="number" id="setting-max-width" value="0" min="0">
      </div>
      <div class="topbar-field">
        <label for="setting-max-height">Max height (px)</label>
        <input type="number" id="setting-max-height" value="0" min="0">
      </div>
      <div class="topbar-field">
        <label for="setting-min-filesize">Min file size (KB)</label>
        <input type="number" id="setting-min-filesize" value="0" min="0">
      </div>
      <div class="topbar-field">
        <label for="setting-max-filesize">Max file size (MB)</label>
        <input type="number" id="setting-max-filesize" value="0" min="0">
      </div>
      <div class="topbar-field">
        <label for="setting-normalised-size">Normalised size</label>
        <select id="setting-normalised-size">
          <option value="16">16x16</option>
          <option value="32" selected>32x32</option>
          <option value="64">64x64</option>
          <option value="128">128x128</option>
        </select>
      </div>
      <div class="topbar-field">
        <label class="checkbox-label">
          <input type="checkbox" id="setting-include-series">
          Include burst/series
        </label>
      </div>
    </div>
    <!-- Row 2: Action buttons + Stats -->
    <div class="topbar-actions">
      <div class="topbar-buttons">
        <button class="btn btn-primary" id="scan-btn"><i data-feather="search"></i> Scan</button>
        <button class="btn btn-danger" id="cancel-btn" style="display:none"><i data-feather="x-circle"></i> Cancel</button>
        <button class="btn btn-danger" id="confirm-deletions-btn" style="display:none"><i data-feather="check-circle"></i> Confirm Deletions</button>
        <button class="btn btn-icon" id="refresh-btn" title="Refresh results"><i data-feather="refresh-cw"></i></button>
        <button class="btn btn-icon" id="collapse-all-btn" title="Expand / Collapse all groups"><i data-feather="chevrons-down"></i></button>
        <!-- Batch actions (visible when groups selected) -->
        <div class="batch-actions" id="batch-actions" style="display:none">
          <span class="batch-label" id="batch-count">0 groups</span>
          <button class="btn btn-primary btn-sm" id="batch-keep-best">Keep Best</button>
          <button class="btn btn-danger btn-sm" id="batch-delete-all">Delete All</button>
        </div>
      </div>
      <div class="topbar-stats" id="stats-bar">
        <div class="stat"><span class="stat-label">Files scanned</span><span class="stat-value" id="stat-files">--</span></div>
        <div class="stat"><span class="stat-label">Duplicate groups</span><span class="stat-value" id="stat-groups">--</span></div>
        <div class="stat"><span class="stat-label">Space savings</span><span class="stat-value" id="stat-savings">--</span></div>
        <div class="stat"><span class="stat-label">Duration</span><span class="stat-value" id="stat-duration">--</span></div>
      </div>
    </div>
    <!-- Progress bar (visible during scan) -->
    <div class="progress-section" id="progress-section">
      <div class="progress-header">
        <span id="progress-phase">Scanning...</span>
        <span id="progress-counts">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- Zone A — Left Panel: preview + folder tree + filters -->
  <div class="left-panel">
    <!-- Section 1: Preview -->
    <div class="panel-section panel-preview">
      <div class="panel-header">Preview</div>
      <div id="preview-area">
        <div class="preview-empty"><i data-feather="image"></i><p>Click a row to preview</p></div>
      </div>
    </div>
    <!-- Drag handle between preview and folders -->
    <div class="panel-resize-handle" data-resize="preview-folders"></div>
    <!-- Section 2: Location with duplicates -->
    <div class="panel-section panel-folders">
      <div class="panel-header">Location with duplicates</div>
      <div id="sidebar-tree"></div>
    </div>
    <!-- Drag handle between folders and filters -->
    <div class="panel-resize-handle" data-resize="folders-filters"></div>
    <!-- Section 3: Filters -->
    <div class="panel-section panel-filters">
      <div class="panel-header">Filters</div>
      <div class="filter-group">
        <label for="filter-filename"><i data-feather="search"></i> Filename</label>
        <input type="text" id="filter-filename" placeholder="Search by name...">
      </div>
      <div class="filter-group">
        <label for="filter-diff">% diff with original</label>
        <div class="range-group">
          <input type="range" id="filter-diff" min="0" max="100" value="100">
          <span class="range-value" id="filter-diff-value">100%</span>
        </div>
      </div>
      <div class="filter-group">
        <label>Extension</label>
        <div class="ext-grid" id="filter-ext-grid">
          <label><input type="checkbox" value="jpg" checked> JPG</label>
          <label><input type="checkbox" value="png" checked> PNG</label>
          <label><input type="checkbox" value="bmp" checked> BMP</label>
          <label><input type="checkbox" value="tiff" checked> TIFF</label>
          <label><input type="checkbox" value="webp" checked> WEBP</label>
          <label><input type="checkbox" value="gif" checked> GIF</label>
          <label><input type="checkbox" value="heic" checked> HEIC</label>
          <label><input type="checkbox" value="dng" checked> DNG</label>
          <label><input type="checkbox" value="arw" checked> ARW</label>
        </div>
      </div>
      <div class="filter-group">
        <label for="filter-min-filesize">Min file size (KB)</label>
        <input type="number" id="filter-min-filesize" value="0" min="0" placeholder="0">
      </div>
      <div class="filter-group">
        <label for="filter-max-filesize">Max file size (MB)</label>
        <input type="number" id="filter-max-filesize" value="0" min="0" placeholder="0">
      </div>
      <div class="filter-group">
        <label for="filter-min-group-size">Min images in group</label>
        <input type="number" id="filter-min-group-size" value="0" min="0" placeholder="0">
      </div>
      <div class="filter-group">
        <label for="filter-max-group-size">Max images in group</label>
        <input type="number" id="filter-max-group-size" value="0" min="0" placeholder="0">
      </div>
    </div>
  </div>

  <!-- Horizontal resize handle for left panel width -->
  <div class="panel-resize-handle-h" id="left-panel-resize"></div>

  <!-- Zone D — Center: Data table -->
  <div class="main-area">
    <div id="results-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon"><i data-feather="camera"></i></div>
        <p>Enter a folder path above and click <strong>Scan</strong> to find duplicate photos.</p>
      </div>
      <div id="groups-container"></div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
