<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DedupPhotos - Duplicate Photo Finder</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f172a;--card:#1e293b;--border:#334155;
    --text:#e2e8f0;--muted:#94a3b8;--accent:#14b8a6;
    --exact:#7c3aed;--perceptual:#06b6d4;
    --keep:#22c55e;--delete:#ef4444;
    --font:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  html{font-size:14px}
  body{
    background:var(--bg);color:var(--text);
    font-family:var(--font);line-height:1.6;
    min-height:100vh;
  }
  a{color:var(--accent);text-decoration:none}

  /* Layout */
  .container{max-width:1400px;margin:0 auto;padding:0 1.5rem}

  /* Header */
  header{
    padding:2.5rem 0 1.5rem;
    border-bottom:1px solid var(--border);
    text-align:center;
  }
  header h1{
    font-size:2rem;letter-spacing:-0.02em;
    background:linear-gradient(135deg,var(--accent),var(--perceptual));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  header p{color:var(--muted);margin-top:.25rem;font-size:.85rem}

  /* Scan Bar */
  .scan-bar{
    display:flex;gap:.75rem;padding:1.25rem 0;
    flex-wrap:wrap;align-items:center;
  }
  .scan-bar input[type="text"]{
    flex:1;min-width:200px;padding:.6rem .85rem;
    background:var(--card);border:1px solid var(--border);
    border-radius:6px;color:var(--text);font-family:var(--font);
    font-size:.9rem;outline:none;transition:border .2s;
  }
  .scan-bar input[type="text"]:focus{border-color:var(--accent)}
  .scan-bar input[type="text"]::placeholder{color:var(--muted)}

  .threshold-group{
    display:flex;align-items:center;gap:.4rem;
    color:var(--muted);font-size:.8rem;white-space:nowrap;
  }
  .scan-bar input[type="number"]{
    width:70px;padding:.6rem .5rem;text-align:center;
    background:var(--card);border:1px solid var(--border);
    border-radius:6px;color:var(--text);font-family:var(--font);
    font-size:.9rem;outline:none;transition:border .2s;
  }
  .scan-bar input[type="number"]:focus{border-color:var(--accent)}

  .btn{
    padding:.6rem 1.4rem;border:none;border-radius:6px;
    font-family:var(--font);font-size:.9rem;font-weight:600;
    cursor:pointer;transition:all .2s;
  }
  .btn-primary{background:var(--accent);color:var(--bg)}
  .btn-primary:hover{filter:brightness(1.15)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-danger{background:var(--delete);color:#fff}
  .btn-danger:hover{filter:brightness(1.15)}
  .btn-danger:disabled{opacity:.5;cursor:not-allowed}

  /* Stats Bar */
  .stats-bar{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:.75rem;padding:1rem 0;
  }
  .stat-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:8px;padding:.85rem 1rem;text-align:center;
  }
  .stat-card .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .stat-card .value{font-size:1.3rem;font-weight:700;margin-top:.15rem;color:var(--accent)}

  /* Progress */
  .progress-section{
    padding:1rem 0;display:none;
  }
  .progress-section.active{display:block}
  .progress-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:.5rem;font-size:.8rem;color:var(--muted);
  }
  .progress-track{
    width:100%;height:8px;background:var(--card);
    border-radius:99px;overflow:hidden;border:1px solid var(--border);
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--accent),var(--perceptual));
    border-radius:99px;transition:width .3s ease;width:0;
  }

  /* Empty state */
  .empty-state{
    text-align:center;padding:4rem 1rem;color:var(--muted);
  }
  .empty-state .icon{font-size:3rem;margin-bottom:1rem;opacity:.4}
  .empty-state p{max-width:400px;margin:0 auto;font-size:.85rem}

  /* Groups */
  .groups{padding:1rem 0 3rem;display:flex;flex-direction:column;gap:1.25rem}

  .group-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;overflow:hidden;
    box-shadow:0 4px 24px rgba(0,0,0,.25);
  }
  .group-header{
    display:flex;align-items:center;gap:.75rem;
    padding:.85rem 1.15rem;border-bottom:1px solid var(--border);
    flex-wrap:wrap;
  }
  .group-title{font-weight:600;font-size:.9rem}
  .badge{
    display:inline-block;padding:.15rem .6rem;border-radius:99px;
    font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;color:#fff;
  }
  .badge-exact{background:var(--exact)}
  .badge-perceptual{background:var(--perceptual)}
  .badge-keep{background:var(--keep);color:var(--bg)}
  .badge-delete{background:var(--delete)}
  .confidence{font-size:.8rem;color:var(--muted);margin-left:auto}

  .group-images{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:1px;background:var(--border);
  }

  /* Image Card */
  .image-card{
    background:var(--card);padding:1rem;
    display:flex;flex-direction:column;gap:.75rem;
  }
  .image-card .thumb-wrap{
    width:100%;max-height:400px;overflow:hidden;
    border-radius:6px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    min-height:120px;
  }
  .image-card .thumb-wrap img{
    max-width:100%;max-height:400px;object-fit:contain;
    display:block;
  }
  .image-card .filename{font-weight:700;font-size:.9rem;word-break:break-all}
  .image-card .filepath{font-size:.75rem;color:var(--muted);word-break:break-all}

  .meta-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:.35rem .75rem;
    font-size:.75rem;
  }
  .meta-item{display:flex;flex-direction:column}
  .meta-item .meta-label{color:var(--muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.04em}
  .meta-item .meta-value{color:var(--text)}

  /* Quality Bar */
  .quality-section{display:flex;align-items:center;gap:.6rem;font-size:.8rem}
  .quality-section .qlabel{color:var(--muted);white-space:nowrap}
  .quality-track{
    flex:1;height:6px;background:var(--bg);
    border-radius:99px;overflow:hidden;
  }
  .quality-fill{
    height:100%;border-radius:99px;transition:width .4s;
  }
  .quality-section .qval{font-weight:700;min-width:2.5em;text-align:right}

  .card-actions{
    display:flex;align-items:center;gap:.5rem;margin-top:auto;
  }
  .card-actions .btn{font-size:.78rem;padding:.4rem .9rem}

  /* Toasts */
  #toast-container{
    position:fixed;bottom:1.5rem;right:1.5rem;
    display:flex;flex-direction:column-reverse;gap:.5rem;
    z-index:9999;pointer-events:none;
  }
  .toast{
    pointer-events:auto;
    padding:.7rem 1.1rem;border-radius:8px;
    font-family:var(--font);font-size:.8rem;font-weight:600;
    color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.35);
    animation:toastIn .25s ease forwards;
    max-width:380px;word-break:break-word;
  }
  .toast.removing{animation:toastOut .2s ease forwards}
  .toast-success{background:var(--keep)}
  .toast-error{background:var(--delete)}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(12px)}}

  /* Confirm overlay */
  .confirm-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
    z-index:9000;
  }
  .confirm-box{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:1.5rem;max-width:420px;width:90%;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
    text-align:center;
  }
  .confirm-box p{margin-bottom:1rem;font-size:.85rem;word-break:break-all}
  .confirm-box .btn-row{display:flex;gap:.5rem;justify-content:center}

  /* Responsive */
  @media(max-width:640px){
    header h1{font-size:1.4rem}
    .scan-bar{flex-direction:column}
    .scan-bar input[type="text"]{min-width:0;width:100%}
    .group-images{grid-template-columns:1fr}
    .stats-bar{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <h1>DedupPhotos</h1>
    <p>Find and remove duplicate photos across your library</p>
  </header>

  <!-- Scan Input Bar -->
  <div class="scan-bar">
    <input type="text" id="scan-path" placeholder="/path/to/photos" aria-label="Folder path">
    <div class="threshold-group">
      <label for="scan-threshold">Threshold:</label>
      <input type="number" id="scan-threshold" value="10" min="0" max="100" aria-label="Similarity threshold">
    </div>
    <button class="btn btn-primary" id="scan-btn" onclick="startScan()">Scan</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-card">
      <div class="label">Files Scanned</div>
      <div class="value" id="stat-files">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Duplicate Groups</div>
      <div class="value" id="stat-groups">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Space Savings</div>
      <div class="value" id="stat-savings">0 B</div>
    </div>
    <div class="stat-card">
      <div class="label">Duration</div>
      <div class="value" id="stat-duration">--</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progress-section">
    <div class="progress-header">
      <span id="progress-phase">Scanning...</span>
      <span id="progress-counts">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Results -->
  <div id="results-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">&#128247;</div>
      <p>Enter a folder path above and click Scan to find duplicate photos.</p>
    </div>
    <div class="groups" id="groups-container"></div>
  </div>

</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script>
(function(){
  "use strict";

  var pollTimer = null;

  /* Helpers */

  function formatBytes(bytes){
    if(bytes==null||isNaN(bytes)) return "--";
    if(bytes===0) return "0 B";
    var units=["B","KB","MB","GB","TB"];
    var i=Math.floor(Math.log(bytes)/Math.log(1024));
    if(i>=units.length) i=units.length-1;
    return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+" "+units[i];
  }

  function formatDuration(ms){
    if(ms==null||isNaN(ms)) return "--";
    if(ms<1000) return ms+"ms";
    var s=ms/1000;
    if(s<60) return s.toFixed(1)+"s";
    var m=Math.floor(s/60);
    s=Math.floor(s%60);
    return m+"m "+s+"s";
  }

  function formatDate(iso){
    if(!iso) return "--";
    try{
      var d=new Date(iso);
      if(isNaN(d.getTime())) return iso;
      return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})
        +" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
    }catch(e){return iso}
  }

  function formatGPS(lat,lon){
    if(lat==null||lon==null) return "--";
    return Number(lat).toFixed(4)+", "+Number(lon).toFixed(4);
  }

  function escapeHtml(s){
    if(!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function qualityColor(score){
    var r,g;
    if(score<=50){r=255;g=Math.round(score*5.1)}
    else{r=Math.round((100-score)*5.1);g=255}
    return "rgb("+r+","+g+",60)";
  }

  /* Toast System */

  function showToast(message,type){
    var container=document.getElementById("toast-container");
    var el=document.createElement("div");
    el.className="toast toast-"+(type||"success");
    el.textContent=message;
    container.appendChild(el);
    setTimeout(function(){
      el.classList.add("removing");
      setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},220);
    },3000);
  }

  /* Confirm Dialog */

  function showConfirm(message,onYes){
    var overlay=document.createElement("div");
    overlay.className="confirm-overlay";
    overlay.innerHTML=
      '<div class="confirm-box">'+
        '<p>'+escapeHtml(message)+'</p>'+
        '<div class="btn-row">'+
          '<button class="btn btn-danger" id="confirm-yes">Delete</button>'+
          '<button class="btn" style="background:var(--border);color:var(--text)" id="confirm-no">Cancel</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector("#confirm-yes").onclick=function(){
      document.body.removeChild(overlay);
      onYes();
    };
    overlay.querySelector("#confirm-no").onclick=function(){
      document.body.removeChild(overlay);
    };
    overlay.addEventListener("click",function(e){
      if(e.target===overlay) document.body.removeChild(overlay);
    });
  }

  /* API Calls */

  window.startScan=function(){
    var pathInput=document.getElementById("scan-path");
    var thresholdInput=document.getElementById("scan-threshold");
    var path=pathInput.value.trim();
    if(!path){
      showToast("Please enter a folder path.","error");
      pathInput.focus();
      return;
    }
    var threshold=parseInt(thresholdInput.value,10);
    if(isNaN(threshold)||threshold<0) threshold=10;

    var btn=document.getElementById("scan-btn");
    btn.disabled=true;
    btn.textContent="Scanning...";

    document.getElementById("groups-container").innerHTML="";
    document.getElementById("empty-state").style.display="none";
    document.getElementById("stats-bar").style.display="none";
    showProgress(true);
    updateProgress("Starting...",0,0);

    fetch("/api/scan",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({path:path,threshold:threshold})
    })
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.status==="complete"){
        stopPolling();
        renderResults(data);
      }else{
        startPolling();
      }
    })
    .catch(function(err){
      showToast("Scan request failed: "+err.message,"error");
      btn.disabled=false;
      btn.textContent="Scan";
      showProgress(false);
    });
  };

  function startPolling(){
    stopPolling();
    pollTimer=setInterval(function(){loadResults()},500);
  }

  function stopPolling(){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null}
  }

  window.loadResults=function(){
    fetch("/api/results")
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.progress){
        updateProgress(
          data.progress.phase||"Scanning...",
          data.progress.current||0,
          data.progress.total||0
        );
      }
      if(data.status==="complete"||data.status==="idle"){
        stopPolling();
        renderResults(data);
      }
    })
    .catch(function(err){
      stopPolling();
      showToast("Failed to fetch results: "+err.message,"error");
      var btn=document.getElementById("scan-btn");
      btn.disabled=false;
      btn.textContent="Scan";
      showProgress(false);
    });
  };

  window.deleteFile=function(path){
    showConfirm("Permanently delete "+path+"?",function(){
      fetch("/api/delete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({path:path})
      })
      .then(function(r){return r.json()})
      .then(function(data){
        if(data.success){
          showToast("Deleted: "+path,"success");
          var cards=document.querySelectorAll(".image-card");
          for(var i=0;i<cards.length;i++){
            if(cards[i].getAttribute("data-path")===path){
              var group=cards[i].closest(".group-card");
              cards[i].parentNode.removeChild(cards[i]);
              if(group){
                var remaining=group.querySelectorAll(".image-card");
                if(remaining.length<=1){
                  group.parentNode.removeChild(group);
                }
              }
              break;
            }
          }
          if(document.querySelectorAll(".group-card").length===0){
            document.getElementById("empty-state").style.display="block";
            document.getElementById("empty-state").querySelector("p").textContent="All duplicates resolved!";
          }
        }else{
          showToast("Delete failed: "+(data.error||"Unknown error"),"error");
        }
      })
      .catch(function(err){
        showToast("Delete failed: "+err.message,"error");
      });
    });
  };

  /* UI Updates */

  function showProgress(show){
    var el=document.getElementById("progress-section");
    if(show) el.classList.add("active");
    else el.classList.remove("active");
  }

  function updateProgress(phase,current,total){
    document.getElementById("progress-phase").textContent=phase;
    document.getElementById("progress-counts").textContent=current+" / "+total;
    var pct=(total>0)?Math.round(current/total*100):0;
    document.getElementById("progress-fill").style.width=pct+"%";
  }

  function renderResults(data){
    var btn=document.getElementById("scan-btn");
    btn.disabled=false;
    btn.textContent="Scan";
    showProgress(false);

    var stats=data.stats||{};
    var statsBar=document.getElementById("stats-bar");
    if(stats.total_files!=null){
      statsBar.style.display="grid";
      document.getElementById("stat-files").textContent=stats.total_files.toLocaleString();
      document.getElementById("stat-groups").textContent=(stats.duplicate_groups||0).toLocaleString();
      document.getElementById("stat-savings").textContent=formatBytes(stats.wasted_bytes||0);
      document.getElementById("stat-duration").textContent=formatDuration(stats.duration_ms);
    }

    var groups=data.groups||[];
    var container=document.getElementById("groups-container");
    container.innerHTML="";

    if(groups.length===0){
      var empty=document.getElementById("empty-state");
      empty.style.display="block";
      if(data.status==="complete"){
        empty.querySelector("p").textContent="No duplicates found. Your library is clean!";
      }
      return;
    }

    document.getElementById("empty-state").style.display="none";

    for(var g=0;g<groups.length;g++){
      container.appendChild(buildGroup(groups[g]));
    }
  }

  function buildGroup(group){
    var card=document.createElement("div");
    card.className="group-card";

    var isExact=(group.match_type==="exact");
    var badgeClass=isExact?"badge-exact":"badge-perceptual";
    var badgeText=isExact?"Exact":"Perceptual";

    var header=document.createElement("div");
    header.className="group-header";
    header.innerHTML=
      '<span class="group-title">Group</span>'+
      '<span class="badge '+badgeClass+'">'+badgeText+'</span>'+
      '<span class="confidence">'+
        (group.confidence!=null?Number(group.confidence).toFixed(1)+"% match":"")+
      '</span>';
    card.appendChild(header);

    var imagesWrap=document.createElement("div");
    imagesWrap.className="group-images";

    var images=group.images||[];
    for(var i=0;i<images.length;i++){
      imagesWrap.appendChild(buildImageCard(images[i]));
    }
    card.appendChild(imagesWrap);
    return card;
  }

  function buildImageCard(img){
    var card=document.createElement("div");
    card.className="image-card";
    card.setAttribute("data-path",img.path||"");

    /* Thumbnail */
    var thumbWrap=document.createElement("div");
    thumbWrap.className="thumb-wrap";
    var thumbImg=document.createElement("img");
    thumbImg.src="/api/thumbnail?path="+encodeURIComponent(img.path||"");
    thumbImg.alt=escapeHtml(img.filename||"thumbnail");
    thumbImg.loading="lazy";
    thumbImg.onerror=function(){this.style.display="none";thumbWrap.textContent="No preview"};
    thumbWrap.appendChild(thumbImg);
    card.appendChild(thumbWrap);

    /* Filename */
    var fnEl=document.createElement("div");
    fnEl.className="filename";
    fnEl.textContent=img.filename||"Unknown";
    card.appendChild(fnEl);

    /* Path */
    var fpEl=document.createElement("div");
    fpEl.className="filepath";
    fpEl.textContent=img.path||"";
    card.appendChild(fpEl);

    /* Metadata grid */
    var meta=document.createElement("div");
    meta.className="meta-grid";
    var fields=[
      ["Resolution",(img.width&&img.height)?(img.width+"x"+img.height):"--"],
      ["File Size",formatBytes(img.size)],
      ["Date Taken",formatDate(img.date_taken)],
      ["GPS",formatGPS(img.gps_lat,img.gps_lon)],
      ["Camera",img.camera||"--"],
      ["Lens",img.lens||"--"],
      ["ISO",img.iso!=null?String(img.iso):"--"],
      ["Quality Score",img.quality_score!=null?(img.quality_score+"/100"):"--"]
    ];
    for(var f=0;f<fields.length;f++){
      meta.innerHTML+=
        '<div class="meta-item">'+
          '<span class="meta-label">'+fields[f][0]+'</span>'+
          '<span class="meta-value">'+escapeHtml(fields[f][1])+'</span>'+
        '</div>';
    }
    card.appendChild(meta);

    /* Quality bar */
    if(img.quality_score!=null){
      var qs=Number(img.quality_score);
      var qSection=document.createElement("div");
      qSection.className="quality-section";
      qSection.innerHTML=
        '<span class="qlabel">Quality</span>'+
        '<div class="quality-track">'+
          '<div class="quality-fill" style="width:'+qs+'%;background:'+qualityColor(qs)+'"></div>'+
        '</div>'+
        '<span class="qval" style="color:'+qualityColor(qs)+'">'+qs+'</span>';
      card.appendChild(qSection);
    }

    /* Actions */
    var actions=document.createElement("div");
    actions.className="card-actions";

    if(img.is_best){
      var keepBadge=document.createElement("span");
      keepBadge.className="badge badge-keep";
      keepBadge.textContent="KEEP";
      actions.appendChild(keepBadge);
    }else{
      var delBadge=document.createElement("span");
      delBadge.className="badge badge-delete";
      delBadge.textContent="DELETE";
      actions.appendChild(delBadge);
    }

    var delBtn=document.createElement("button");
    delBtn.className="btn btn-danger";
    delBtn.textContent="Delete";
    delBtn.style.marginLeft="auto";
    (function(p){
      delBtn.onclick=function(){window.deleteFile(p)};
    })(img.path);
    actions.appendChild(delBtn);

    card.appendChild(actions);
    return card;
  }

})();
</script>

</body>
</html>
